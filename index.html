<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c12">
<title>PULSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* Emoji font FIRST so all emojis render on Android/Chrome */
html,body{
  height:100%;overflow:hidden;
  font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla","DM Sans",sans-serif;
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
  background:var(--bg);color:var(--t);
}
/* Non-emoji text uses DM Sans */
.dm{font-family:"DM Sans",sans-serif}
input,textarea,select,button{
  font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","DM Sans",sans-serif;
  color:var(--t);
}
img{object-fit:cover}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}

/* TOKENS */
:root{
  --p:#0ea5e9;--p2:#38bdf8;--pg:rgba(14,165,233,.2);--pg2:rgba(14,165,233,.08);
  --green:#22c55e;--red:#f43f5e;--amber:#f59e0b;--purple:#8b5cf6;
  --ig:rgba(34,197,94,.13);--eg:rgba(244,63,94,.13);
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --r:16px;--rsm:11px;
}
/* DARK (default) */
:root,[data-t=dark]{
  --bg:#080c12;--bg1:#0d1117;--bg2:#161b24;--bg3:#1c2333;--bg4:#242e42;--bg5:#2d3a52;
  --gl:rgba(255,255,255,.03);--gl2:rgba(255,255,255,.06);
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t:#e8edf5;--t2:#8899b0;--t3:#4a5568;
  --bme:linear-gradient(145deg,#0e3a6e,#0f2744);--bthem:#1c2333;
  --sh:0 8px 40px rgba(0,0,0,.6);--ss:0 2px 12px rgba(0,0,0,.4);
}
/* LIGHT */
[data-t=light]{
  --bg:#f0f4f8;--bg1:#fff;--bg2:#f8fafc;--bg3:#eef2f7;--bg4:#e2e8f0;--bg5:#d0dae8;
  --gl:rgba(0,0,0,.02);--gl2:rgba(0,0,0,.04);
  --b:rgba(0,0,0,.07);--b2:rgba(0,0,0,.12);
  --t:#0d1117;--t2:#4a5568;--t3:#94a3b8;
  --bme:linear-gradient(145deg,#0ea5e9,#0284c7);--bthem:#fff;
  --sh:0 8px 40px rgba(0,0,0,.1);--ss:0 2px 12px rgba(0,0,0,.07);
}
@media(prefers-color-scheme:light){:root:not([data-t]){
  --bg:#f0f4f8;--bg1:#fff;--bg2:#f8fafc;--bg3:#eef2f7;--bg4:#e2e8f0;--bg5:#d0dae8;
  --gl:rgba(0,0,0,.02);--gl2:rgba(0,0,0,.04);--b:rgba(0,0,0,.07);--b2:rgba(0,0,0,.12);
  --t:#0d1117;--t2:#4a5568;--t3:#94a3b8;
  --bme:linear-gradient(145deg,#0ea5e9,#0284c7);--bthem:#fff;
  --sh:0 8px 40px rgba(0,0,0,.1);--ss:0 2px 12px rgba(0,0,0,.07);
}}

/* AUTH */
/* Google Sign-In button */
.gbtn{width:100%;padding:12px;border-radius:11px;background:#fff;color:#333;font-size:14px;font-weight:700;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:.18s;margin-top:8px;box-shadow:0 1px 6px rgba(0,0,0,.12)}
.gbtn:hover{box-shadow:0 3px 12px rgba(0,0,0,.18);transform:translateY(-1px)}
.gbtn svg{width:20px;height:20px;flex-shrink:0}
.gor{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--t3);font-size:12px;font-weight:600}
.gor::before,.gor::after{content:'';flex:1;height:1px;background:var(--b)}

#authWall{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9000;padding:16px}
.ac{width:100%;max-width:400px;animation:suIn .5s var(--spring) both}
@keyframes suIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.abrand{text-align:center;margin-bottom:20px}
.abrand-ic{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--p),var(--purple));box-shadow:0 0 40px var(--pg);font-size:28px;margin-bottom:10px}
.abrand h1{font-size:28px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--t),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.abrand p{font-size:13px;color:var(--t2);margin-top:3px}
.abox{background:var(--bg1);border:1px solid var(--b2);border-radius:22px;padding:24px;box-shadow:var(--sh)}
.seg{display:flex;background:var(--bg3);border-radius:11px;padding:3px;gap:3px;margin-bottom:18px}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;color:var(--t3);transition:.2s}
.seg button.on{background:var(--p);color:#fff;box-shadow:0 2px 10px var(--pg)}
.fp{display:none}.fp.on{display:block}
.avup{width:66px;height:66px;border-radius:50%;background:var(--bg3);border:2px dashed var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin:0 auto 14px;overflow:hidden;transition:.2s;position:relative}
.avup:hover{border-color:var(--p)}
.avup img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.avup .aic{font-size:22px;color:var(--t3)}.avup .alb{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase}
.fg{margin-bottom:12px}.fl{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:11px 13px;font-size:14px;outline:none;transition:.2s}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--pg2)}.fi::placeholder{color:var(--t3)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cbtn{width:100%;padding:13px;border-radius:11px;background:var(--p);color:#fff;font-size:15px;font-weight:700;transition:.2s;box-shadow:0 4px 18px var(--pg);margin-top:4px}
.cbtn:hover{transform:translateY(-1px)}
.aerr{background:var(--eg);border:1px solid rgba(244,63,94,.25);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--red);margin-bottom:12px;display:none}
.aalt{text-align:center;font-size:13px;color:var(--t2);margin-top:12px}.aalt a{color:var(--p);font-weight:600;cursor:pointer}

/* APP SHELL */
#app{display:none;height:100vh;overflow:hidden;position:relative}

/* DOCK */
.dock{position:fixed;left:0;top:0;bottom:0;width:62px;background:var(--bg1);border-right:1px solid var(--b);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:3px;z-index:100}
.dlogo{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--p),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;box-shadow:0 2px 12px var(--pg);flex-shrink:0}
.dbtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--t3);transition:.18s;position:relative;flex-shrink:0;cursor:pointer;border:none;background:none}
.dbtn:hover{background:var(--gl2);color:var(--t2)}.dbtn.on{background:var(--pg2);color:var(--p)}
.nbadge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid var(--bg1)}
.nbadge.on{display:flex}
.dsp{flex:1}
.dav{width:34px;height:34px;border-radius:10px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:.2s;display:block;flex-shrink:0}
.dav:hover,.dav-ph:hover{border-color:var(--p)!important}
.dav-ph{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;cursor:pointer;border:2px solid transparent;transition:.2s;flex-shrink:0}

/* CONTENT */
.content{position:fixed;left:62px;right:0;top:0;bottom:0;display:grid;grid-template-columns:320px 1fr;overflow:hidden}
.sect{display:none}.sect.on{display:contents}

/* SIDEBAR */
.sb{background:var(--bg1);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:14px 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--b)}
.sbt{font-size:18px;font-weight:800;letter-spacing:-.4px}
.sbacts{display:flex;gap:3px}
.ib{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);transition:.16s;cursor:pointer;border:none;background:none}
.ib:hover{background:var(--gl2);color:var(--t)}.ib.pr{background:var(--p);color:#fff;box-shadow:0 2px 8px var(--pg)}.ib.pr:hover{background:#0284c7}
.sbsrch{padding:9px 12px;flex-shrink:0}
.sw{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:8px 11px}
.sw input{flex:1;background:none;border:none;outline:none;font-size:13.5px;color:var(--t)}.sw input::placeholder{color:var(--t3)}
.sbtabs{display:flex;border-bottom:1px solid var(--b);padding:0 12px;flex-shrink:0}
.sbtab{flex:1;padding:9px 6px;font-size:11px;font-weight:700;color:var(--t3);border-bottom:2px solid transparent;cursor:pointer;transition:.16s;text-align:center;text-transform:uppercase;letter-spacing:.06em}
.sbtab.on{color:var(--p);border-bottom-color:var(--p)}
.lst{flex:1;overflow-y:auto}
.li{display:flex;align-items:center;gap:11px;padding:10px 13px;cursor:pointer;transition:.12s;position:relative;border-bottom:1px solid var(--b)}
.li:hover{background:var(--gl)}.li.on{background:var(--gl2)}
.li.on::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--p);border-radius:0 3px 3px 0}
.onring{position:relative;flex-shrink:0}.ondot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--bg1)}
.lib{flex:1;min-width:0}
.lir1{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.linm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.litm{font-size:11px;color:var(--t3);flex-shrink:0;font-family:"DM Mono",monospace}
.lir2{display:flex;justify-content:space-between;align-items:center}
.lipv{font-size:12.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.bdg{background:var(--p);color:#fff;border-radius:20px;min-width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;margin-left:5px}
.emst{padding:44px 18px;text-align:center;color:var(--t3)}.emst .ei{font-size:40px;margin-bottom:9px}.emst p{font-size:13px;line-height:1.6}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg)}
.main::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle at 1px 1px,var(--b) 1px,transparent 0);background-size:26px 26px;opacity:.5}

/* HEADER */
.mhd{display:flex;align-items:center;gap:11px;padding:12px 18px;background:var(--bg1);border-bottom:1px solid var(--b);flex-shrink:0;position:relative;z-index:2}
.mhnm{font-size:15px;font-weight:700;letter-spacing:-.2px}
.mhsb{font-size:12px;color:var(--t3);margin-top:1px}
.mhacts{display:flex;gap:2px;margin-left:auto}
.back-mb{display:none}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:12px 52px;display:flex;flex-direction:column;gap:1px;position:relative;z-index:1}
.dchip{text-align:center;margin:10px 0 4px}.dchip span{background:var(--bg1);color:var(--t3);font-size:11px;font-weight:600;font-family:"DM Mono",monospace;padding:4px 11px;border-radius:20px;border:1px solid var(--b)}
.brow{display:flex;align-items:flex-end;gap:6px;margin-bottom:1px}.brow.me{flex-direction:row-reverse}
.bav{width:24px;height:24px;border-radius:7px;flex-shrink:0;object-fit:cover;margin-bottom:2px}
.bav-ph{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;margin-bottom:2px}
.bub{max-width:62%;border-radius:15px;padding:8px 12px 6px;position:relative;cursor:pointer;animation:bpop .2s var(--spring) both;word-wrap:break-word;box-shadow:var(--ss)}
@keyframes bpop{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:none}}
.bub.me{background:var(--bme);border-bottom-right-radius:3px;border:1px solid rgba(14,165,233,.2)}
.bub.them{background:var(--bthem);border:1px solid var(--b);border-bottom-left-radius:3px}
.bsndr{font-size:11px;font-weight:700;margin-bottom:3px}
.btxt{font-size:14px;line-height:1.55;white-space:pre-wrap}
.bub.me .btxt{color:rgba(255,255,255,.93)}.bub.them .btxt{color:var(--t)}
.bemoji{font-size:50px;line-height:1.2;display:block;padding:4px 0}
.bimg{max-width:100%;border-radius:9px;display:block;margin-bottom:4px;cursor:pointer;max-height:260px;object-fit:cover;width:100%}
.bfile{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.08);border-radius:9px;padding:9px 11px;margin-bottom:4px}
.bub.them .bfile{background:var(--bg3)}
.bfic{font-size:22px;flex-shrink:0}
.bfnm{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bfsz{font-size:10.5px;color:var(--t3);margin-top:1px}
.bub.me .bfsz{color:rgba(255,255,255,.4)}
.breply{border-left:3px solid rgba(255,255,255,.4);border-radius:3px;padding:5px 8px;margin-bottom:5px;background:rgba(255,255,255,.08);cursor:pointer}
.bub.them .breply{border-left-color:var(--p);background:var(--bg3)}
.breplynm{font-size:11px;font-weight:700;color:rgba(255,255,255,.75)}.bub.them .breplynm{color:var(--p)}
.brepltx{font-size:11.5px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bub.them .brepltx{color:var(--t2)}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px}
.btm{font-size:10px;font-family:"DM Mono",monospace;opacity:.5}.btick{font-size:11px;opacity:.7}.btick.rd{color:#7dd3fc;opacity:1}
.breacts{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.breact{background:var(--bg3);border:1px solid var(--b);border-radius:20px;padding:2px 7px;font-size:12px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:2px}
.breact:hover,.breact.my{border-color:var(--p);background:var(--pg2)}.breact-n{font-size:10px;color:var(--t2)}
.bfwd{font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:3px;margin-bottom:3px}
.bub.them .bfwd{color:var(--t3)}

/* VOICE MSG */
.bvoice{display:flex;align-items:center;gap:8px;padding:2px 0;min-width:200px}
.vplay{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;transition:.15s;border:none}
.bub.them .vplay{background:var(--p)}.vplay:hover{transform:scale(1.1)}
.vwv{display:flex;align-items:center;gap:1.5px;flex:1;height:28px;cursor:pointer}
.vb{width:3px;border-radius:2px;background:rgba(255,255,255,.28);flex-shrink:0}
.bub.them .vb{background:rgba(14,165,233,.35)}
.vb.played{background:rgba(255,255,255,.85)}.bub.them .vb.played{background:var(--p)}
.vdur{font-size:11px;font-family:"DM Mono",monospace;opacity:.55;white-space:nowrap;min-width:32px;text-align:right}

/* POLL */
.bpoll{min-width:240px}
.bpoll-q{font-size:14px;font-weight:700;margin-bottom:10px}
.bub.me .bpoll-q{color:rgba(255,255,255,.93)}
.bpoll-opt{margin-bottom:7px;cursor:pointer}
.bpoll-bar{height:34px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);position:relative;overflow:hidden;display:flex;align-items:center;padding:0 10px;transition:.3s}
.bub.them .bpoll-bar{background:var(--bg3);border-color:var(--b)}
.bpoll-opt.voted .bpoll-bar{border-color:var(--p)}
.bpoll-fill{position:absolute;left:0;top:0;bottom:0;background:var(--pg2);transition:width .4s var(--ease)}
.bpoll-lbl{position:relative;z-index:1;font-size:13px;font-weight:600;flex:1}
.bub.me .bpoll-lbl{color:rgba(255,255,255,.9)}
.bpoll-pct{position:relative;z-index:1;font-size:11px;font-family:"DM Mono",monospace;color:var(--p)}

/* REPORT */
.brpt{min-width:270px;overflow-x:auto}
.brpt-title{font-size:12px;font-weight:700;margin-bottom:5px;color:rgba(255,255,255,.6)}
.bub.them .brpt-title{color:var(--t2)}
.brpt table{width:100%;border-collapse:collapse;font-size:11px;font-family:"DM Mono",monospace}
.brpt th{color:var(--p);font-size:9px;text-transform:uppercase;padding:5px 6px;border-bottom:1px solid var(--b);text-align:left;white-space:nowrap}
.brpt td{padding:5px 6px;border-bottom:1px solid var(--b);white-space:nowrap}
.brpt tr:last-child td{border-bottom:none}
.brpt-sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:7px}
.brpt-sum-item .sl{font-size:9px;opacity:.5;font-family:"DM Mono",monospace;text-align:center}
.brpt-sum-item .sv{font-size:12px;font-weight:700;font-family:"DM Mono",monospace;text-align:center}

/* TYPING */
.typrow{padding:3px 52px 5px;display:none;position:relative;z-index:1}.typrow.on{display:flex;align-items:center;gap:6px}
.typbub{display:inline-flex;align-items:center;gap:3px;background:var(--bthem);border:1px solid var(--b);border-radius:15px;border-bottom-left-radius:3px;padding:8px 12px;box-shadow:var(--ss)}
.td{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:tda .9s infinite ease-in-out}
.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes tda{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

/* REPLY BAR */
.rplyb{display:none;align-items:center;gap:9px;padding:7px 15px;background:var(--bg1);border-top:1px solid var(--b);flex-shrink:0}.rplyb.on{display:flex}
.rbln{width:3px;height:32px;border-radius:3px;background:var(--p);flex-shrink:0}
.rbinf{flex:1;min-width:0}.rbnm{font-size:11.5px;font-weight:700;color:var(--p)}.rbtx{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rbx{width:26px;height:26px;border-radius:7px;font-size:15px;color:var(--t3);display:flex;align-items:center;justify-content:center}.rbx:hover{background:var(--bg4)}

/* INPUT AREA */
.inparea{flex-shrink:0;padding:9px 13px;background:var(--bg1);border-top:1px solid var(--b);position:relative;z-index:2}
.emtray{position:absolute;bottom:calc(100% + 5px);left:8px;right:8px;background:var(--bg1);border:1px solid var(--b2);border-radius:14px;padding:12px;display:none;flex-wrap:wrap;gap:4px;max-height:200px;overflow-y:auto;box-shadow:var(--sh);z-index:20}
.emtray.on{display:flex}
.em{font-size:22px;cursor:pointer;padding:3px;border-radius:7px;transition:.12s;line-height:1}
.em:hover{background:var(--gl2);transform:scale(1.22)}
/* Attach tray - fixed position so it never gets cut off */
.atmenu{position:fixed;bottom:70px;left:8px;right:8px;background:var(--bg1);border:1px solid var(--b2);border-radius:14px;padding:12px;display:none;grid-template-columns:repeat(4,1fr);gap:8px;box-shadow:var(--sh);z-index:500}
.atmenu.on{display:grid}

.amit:hover{background:var(--bg4);color:var(--t);transform:translateY(-2px)}
.amic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.inprow{display:flex;align-items:flex-end;gap:7px}

.inpic:hover,.inpic.on{color:var(--p)}
